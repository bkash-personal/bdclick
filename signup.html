<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BDClick</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">BD<span>Click</span></a>
            <div class="nav-links">
                <a href="index.html">হোম</a>
                <a href="services.html">সার্ভিস</a>
                <a href="pricing.html">মূল্য</a>
                <a href="about.html">আমাদের সম্পর্কে</a>
                <a href="contact.html">যোগাযোগ</a>
            </div>
            <div class="nav-buttons">
                <a href="login.html" class="btn btn-outline">লগইন</a>
                <a href="signup.html" class="btn btn-primary">রেজিস্টার</a>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>ফ্রি একাউন্ট তৈরি করুন</h1>
                    <p>আজই শুরু করুন - কোনো ক্রেডিট কার্ড লাগবে না!</p>
                </div>
                
                <form class="auth-form" id="signupForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>পূর্ণ নাম</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user"></i>
                                <input type="text" placeholder="আপনার পূর্ণ নাম" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>ইমেইল</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="email" placeholder="আপনার ইমেইল" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>মোবাইল নম্বর</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" placeholder="01XXX-XXXXXX" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>ইউজারনেম</label>
                        <div class="input-wrapper">
                            <i class="fas fa-at"></i>
                            <input type="text" placeholder="আপনার ইউজারনেম" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>পাসওয়ার্ড</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" placeholder="পাসওয়ার্ড দিন" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>পাসওয়ার্ড নিশ্চিত করুন</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" placeholder="পুনরায় পাসওয়ার্ড" required>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-auth">
                        <i class="fas fa-user-plus"></i> একাউন্ট তৈরি করুন
                    </button>
                </form>
                
                <p class="auth-footer">
                    ইতিমধ্যে একাউন্ট আছে? <a href="login.html">লগইন করুন</a>
                </p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-about">
                <h3>BD<span>Click</span></h3>
                <p>বাংলাদেশের সেরা SMM প্যানেল।</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© ২০২৫ BDClick</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
